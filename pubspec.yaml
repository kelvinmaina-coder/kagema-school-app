name: kagema_school
description: "School Management System for Kagema Comprehensive."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  pdf: ^3.11.1
  printing: ^5.13.2
  url_launcher: ^6.3.1
  provider: ^6.1.2
  share_plus: ^13.1.0
  google_fonts: ^8.1.0
  supabase_flutter: ^2.8.5
  package_info_plus: ^10.1.0
  uuid: ^4.5.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
    - assets/icons/
